[workspace]
resolver = "2"
members = [
    "crates/qfin",
    "crates/qfin-api",
    "crates/qfin-error",
    "crates/qfin-fundamental",
    "crates/qfin-math",
    "crates/qfin-ml",
    "crates/qfin-technical",
    "crates/qfin-time"
]

[workspace.package]
version = "0.0.2"
authors = ["Jacky Sum <code@jsum.io"]
edition = "2024"
description = "Collection of crates for quantitative finance."
readme = "README.md"
repository = "https://github.com/jackysum/qfin"
license = "Apache-2.0"
keywords = ["quantitative", "finance", "math"]
categories = ["finance", "mathematics"]

[workspace.dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
mockito = "1"
qfin-api = { version = "0.0", path = "crates/qfin-api" }
qfin-error = { version = "0.0", path = "crates/qfin-error" }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1.44", features = ["full"] }
